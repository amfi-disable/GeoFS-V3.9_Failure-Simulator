name: Feature Request
description: Suggest an idea for the Failure Simulator
labels: ["enhancement"]
body:
  - type: textarea
    id: feature-description
    attributes:
      label: Describe the feature
      description: A clear and concise description of what you want to happen.
      placeholder: I would love to see...
    validations:
      required: true
  - type: textarea
    id: use-case
    attributes:
      label: Why is this feature needed?
      description: How would this improve the simulation experience?
    validations:
      required: true
  - type: markdown
    attributes:
      value: |
        Thanks for your suggestion! We review all feature requests regularly.
