name: Bug Report
description: File a report to help us improve the simulator
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us what you expected to happen
      placeholder: Tell us what you did and what went wrong...
    validations:
      required: true
  - type: dropdown
    id: aircraft
    attributes:
      label: Aircraft
      description: Which aircraft were you flying?
      options:
        - A380-800
        - Boeing 737 Max
        - Cessna 172
        - Other (Please specify in description)
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Simulator Version
      description: e.g. v1.0.0
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Console Logs
      description: Please paste any red errors from the browser console (F12)
      render: shell
